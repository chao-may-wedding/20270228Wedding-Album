<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>婚宴相簿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-color: #deff9a;
      --primary-hover: #c2e67b;
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.6);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.5;
      animation: float 10s infinite ease-in-out alternate;
    }
    .orb-1 { width: 300px; height: 300px; background: #deff9a; top: -100px; left: -100px; }
    .orb-2 { width: 400px; height: 400px; background: #38bdf8; bottom: -150px; right: -100px; animation-delay: -5s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 50px) scale(1.1); }
    }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 30px;
      width: 90%;
      max-width: 500px;
      text-align: center;
      margin: 30px 0;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      z-index: 10;
      transition: transform 0.3s ease;
    }
    .glass-card:hover { transform: translateY(-5px); }

    h2 { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
    p.subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 25px; line-height: 1.5; }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
      color: #0f172a;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(222, 255, 154, 0.3);
    }
    .upload-btn:hover { box-shadow: 0 6px 20px rgba(222, 255, 154, 0.5); transform: scale(1.02); }
    #fileInput { display: none; }

    .status-container { margin-top: 20px; display: none; }
    #status-text { font-size: 14px; font-weight: 500; margin-bottom: 10px; white-space: pre-line; }
    .progress-track { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; }
    .progress-bar { height: 100%; width: 0%; background: var(--primary-color); border-radius: 10px; transition: width 0.4s ease; box-shadow: 0 0 10px var(--primary-color); }

    .slider-section {
      flex-grow: 1;
      width: 100%;
      max-width: 1200px;
      margin: 0 20px 30px;
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      background: #000;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 450px;
      touch-action: pan-y;
    }

    .slide-item {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      object-fit: contain;
      transform: scale(1.03);
      pointer-events: none;
    }
    .slide-item.active { opacity: 1; transform: scale(1); pointer-events: auto; }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 20;
      transition: all 0.3s ease;
      opacity: 0.7;
      user-select: none;
    }
    .nav-btn:hover { background: rgba(15, 23, 42, 0.8); border-color: var(--primary-color); color: var(--primary-color); opacity: 1; transform: translateY(-50%) scale(1.1); }
    .prev-btn { left: 20px; }
    .next-btn { right: 20px; }
    .nav-btn.hidden { display: none !important; }

    .no-media { color: var(--text-muted); font-size: 18px; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 5; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="glass-card">
    <h2>✨ 精彩瞬間 即時共享</h2>
    <p class="subtitle">支援多檔案自動排隊上傳。<br>下方相框支援【手動點擊按鈕】或【手機左右滑動】切換！</p>
    
    <label class="upload-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
      選擇照片 / 影片
      <input type="file" id="fileInput" accept="image/*,video/*" multiple>
    </label>

    <div class="status-container" id="statusContainer">
      <div id="status-text">準備上傳...</div>
      <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
  </div>

  <div class="slider-section" id="slider">
    <div class="nav-btn prev-btn hidden" id="prevBtn" onclick="prevSlide()">❮</div>
    <div class="nav-btn next-btn hidden" id="nextBtn" onclick="nextSlide()">❯</div>

    <div class="no-media" id="noMediaHint">
      <div class="spinner"></div>
      <span>正在連線至雲端硬碟載入影像...</span>
    </div>
  </div>

  <script>
    // ⚠️ 請在此處貼上您重新部署後取得的 Google Apps Script 網頁應用程式 URL
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzUOYVyFkIGrR4dGN9tiG5Vh6pGqddHd2UZxgCZGgYsCJl-G0IzqA70rhs2AOVvjiyYBg/exec'; 

    let uploadQueue = [];
    let totalFiles = 0;
    let uploadedCount = 0;

    const fileInput = document.getElementById('fileInput');
    const statusContainer = document.getElementById('statusContainer');
    const statusText = document.getElementById('status-text');
    const progressBar = document.getElementById('progressBar');

    fileInput.addEventListener('change', function(e) {
      const files = e.target.files;
      if (files.length === 0) return;

      totalFiles = files.length;
      uploadedCount = 0;
      uploadQueue = Array.from(files);
      
      statusContainer.style.display = 'block';
      updateProgressUI(0, '佇列準備中...');
      processUploadQueue();
    });

    function updateProgressUI(percent, message, color = '#f8fafc') {
      progressBar.style.width = percent + '%';
      statusText.innerText = message;
      statusText.style.color = color;
      
      if (color === '#ef4444') {
        progressBar.style.background = '#ef4444';
        progressBar.style.boxShadow = '0 0 10px #ef4444';
      } else if (color === '#10b981' || percent === 100) {
        progressBar.style.background = '#10b981';
        progressBar.style.boxShadow = '0 0 10px #10b981';
      } else {
        progressBar.style.background = 'var(--primary-color)';
        progressBar.style.boxShadow = '0 0 10px var(--primary-color)';
      }
    }

    // 使用標準 fetch 實作多檔案排隊上傳
    function processUploadQueue() {
      if (uploadQueue.length === 0) {
        updateProgressUI(100, `🎉 完美！${totalFiles} 個檔案已全數上傳完畢。`, '#10b981');
        fetchMedia(); 
        fileInput.value = ''; 
        setTimeout(() => { statusContainer.style.display = 'none'; }, 5000);
        return;
      }

      const file = uploadQueue.shift(); 
      const currentPercent = (uploadedCount / totalFiles) * 100;
      
      updateProgressUI(currentPercent, `⏳ 正在傳輸 (${uploadedCount + 1}/${totalFiles}):\n${file.name}`, '#38bdf8');

      const reader = new FileReader();
      reader.onload = function(event) {
        const base64Data = event.target.result;
        
        // 發送給 GAS doPost 的資料包
        const payload = {
          action: 'upload',
          base64Data: base64Data,
          fileName: file.name,
          mimeType: file.type
        };

        // 核心改變：使用 fetch 代替 google.script.run
        // ⚠️ 注意：不設 Content-Type 標頭以避開 CORS OPTIONS 預檢限制
        fetch(GAS_API_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(res => {
          if(res.success) {
            uploadedCount++;
            const newPercent = (uploadedCount / totalFiles) * 100;
            updateProgressUI(newPercent, `✅ ${file.name} 傳送成功！\n冷卻中...`, 'var(--primary-color)');
            setTimeout(processUploadQueue, 3000); 
          } else {
            updateProgressUI(currentPercent, `⚠️ 伺服器忙碌 (${res.error})，重試中...`, '#ef4444');
            uploadQueue.unshift(file);
            setTimeout(processUploadQueue, 5000); 
          }
        })
        .catch(err => {
          updateProgressUI(currentPercent, `⚠️ 網路中斷或伺服器超載，重試中...`, '#ef4444');
          uploadQueue.unshift(file);
          setTimeout(processUploadQueue, 5000);
        });
      };
      reader.readAsDataURL(file);
    }

    // --- 輪播與手動切換邏輯 (改用 fetch 串接) ---
    let mediaFiles = [];
    let currentIndex = 0;
    let slideInterval;
    const SLIDE_DURATION = 6000;
    let touchStartX = 0;
    let touchEndX = 0;

    function fetchMedia() {
      const payload = { action: 'fetch' };

      fetch(GAS_API_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(res => {
        if (res.success && res.data.length > 0) {
          mediaFiles = res.data;
          renderSlider();
        } else if (res.success) {
          document.getElementById('noMediaHint').innerHTML = '<span>尚無影像，快來上傳第一張照片吧！</span>';
        }
      })
      .catch(err => {
        console.error("無法載入雲端硬碟檔案列表:", err);
      });
    }

    function renderSlider() {
      const slider = document.getElementById('slider');
      const hint = document.getElementById('noMediaHint');
      if (hint) hint.style.display = 'none';

      const currentItemsCount = slider.querySelectorAll('.slide-item').length;
      if (currentItemsCount !== mediaFiles.length) {
        const items = slider.querySelectorAll('.slide-item');
        items.forEach(item => item.remove());
        
        mediaFiles.forEach((file, index) => {
          let element;
          if (file.mimeType.startsWith('image/')) {
            element = document.createElement('img');
            element.src = file.url;
          } else if (file.mimeType.startsWith('video/')) {
            element = document.createElement('video');
            element.src = file.url;
            element.controls = false;
            element.muted = true; 
            element.loop = true;
          }
          
          element.className = 'slide-item';
          if (index === currentIndex) element.classList.add('active');
          slider.appendChild(element);
        });
      }

      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      if (mediaFiles.length > 1) {
        prevBtn.classList.remove('hidden');
        nextBtn.classList.remove('hidden');
        resetTimer(); 
      } else {
        prevBtn.classList.add('hidden');
        nextBtn.classList.add('hidden');
      }
    }

    function changeSlide(nextIndex) {
      const items = document.querySelectorAll('.slide-item');
      if (items.length === 0) return;

      items[currentIndex].classList.remove('active');
      if (items[currentIndex].tagName === 'VIDEO') {
        items[currentIndex].pause();
      }

      currentIndex = nextIndex;
      items[currentIndex].classList.add('active');
      if (items[currentIndex].tagName === 'VIDEO') {
        items[currentIndex].play();
      }
      resetTimer();
    }

    function nextSlide() {
      if(mediaFiles.length === 0) return;
      let nextIndex = (currentIndex + 1) % mediaFiles.length;
      changeSlide(nextIndex);
    }

    function prevSlide() {
      if(mediaFiles.length === 0) return;
      let nextIndex = (currentIndex - 1 + mediaFiles.length) % mediaFiles.length;
      changeSlide(nextIndex);
    }

    function resetTimer() {
      clearInterval(slideInterval);
      if (mediaFiles.length > 1) {
        slideInterval = setInterval(nextSlide, SLIDE_DURATION);
      }
    }

    const sliderContainer = document.getElementById('slider');
    sliderContainer.addEventListener('touchstart', function(e) {
      touchStartX = e.changedTouches[0].screenX;
    }, false);

    sliderContainer.addEventListener('touchend', function(e) {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, false);

    function handleSwipe() {
      const swipeThreshold = 50;
      if (touchStartX - touchEndX > swipeThreshold) nextSlide();
      if (touchEndX - touchStartX > swipeThreshold) prevSlide();
    }

    // 啟動系統
    fetchMedia();
    setInterval(fetchMedia, 15000); 
  </script>
</body>
</html>
